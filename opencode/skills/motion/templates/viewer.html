<!DOCTYPE html>
<!--
  p5.js Interactive Viewer Template
  ==================================
  USE THIS AS THE STARTING POINT for interactive generative art sketches.

  FIXED (keep as-is):
  ✓ Layout structure (sidebar + canvas)
  ✓ Seed navigation (prev/next/random/jump)
  ✓ Action buttons (regenerate, reset, download PNG)
  ✓ Responsive canvas sizing
  ✓ Parameter update + regeneration wiring

  VARIABLE (replace for each project):
  ✗ ALL color values in :root — derive from project mood
  ✗ The p5.js algorithm (setup/draw/classes)
  ✗ The PARAMS object (define what your art needs)
  ✗ The parameter controls in the sidebar
  ✗ The title and description

  For headless export: add noLoop() and window._p5Ready=true in setup().
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- derive from project context --></title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>
  /* ============================================================
     DESIGN TOKENS — Derive ALL values from project context.
     Use the design skill or project mood to determine:
     - Warm or cool atmosphere
     - Light or dark surface
     - Accent color family
     - Typography genre (serif, sans, mono)
     ============================================================ */
  :root {
    /* Surfaces — derive from atmosphere (warm/cool, light/dark) */
    --surface-primary: /* derive from mood */;
    --surface-elevated: /* slightly lighter/darker than primary */;
    --surface-canvas: /* slightly different from primary */;

    /* Text — derive from surface for appropriate contrast */
    --text-primary: /* derive from surface — high contrast */;
    --text-secondary: /* derive from surface — medium contrast */;
    --text-muted: /* derive from surface — low contrast */;

    /* Accent — derive from project brand/mood */
    --accent: /* derive from mood */;
    --accent-subtle: /* derive from accent — lower saturation or alpha */;
    --accent-border: /* derive from accent — used for borders, low alpha */;

    /* Typography — derive from content type and tone */
    --font-ui: /* derive: system-ui, sans-serif, serif, or monospace */;
    --font-mono: /* derive: monospace font for seeds/values */;

    /* Spacing — derive from desired density */
    --space-xs: /* derive base unit, e.g. 4px */;
    --space-sm: /* derive, e.g. 8px */;
    --space-md: /* derive, e.g. 16px */;
    --space-lg: /* derive, e.g. 24px */;

    /* Radius — derive from design personality (sharp/soft/pill) */
    --radius-sm: /* derive, e.g. 4px */;
    --radius-md: /* derive, e.g. 8px */;
    --radius-lg: /* derive, e.g. 12px */;

    /* Border — derive from surface for subtle separation */
    --border-subtle: /* derive from surface — barely visible */;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-ui);
    background: var(--surface-primary);
    color: var(--text-secondary);
    display: flex;
    min-height: 100vh;
    overflow: hidden;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--surface-elevated);
    border-right: 1px solid var(--border-subtle);
    padding: var(--space-lg);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: var(--space-lg);
  }

  .sidebar h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: var(--space-xs);
    letter-spacing: -0.01em;
  }

  .sidebar .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: var(--space-sm);
    line-height: 1.5;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: var(--space-sm);
  }

  /* --- Seed Controls --- */
  .seed-display {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    text-align: center;
    padding: var(--space-sm) var(--space-md);
    background: var(--surface-canvas);
    border-radius: var(--radius-md);
    border: 1px solid var(--border-subtle);
    margin-bottom: var(--space-sm);
    transition: color 0.3s;
  }

  .seed-nav {
    display: flex;
    gap: var(--space-xs);
    margin-bottom: var(--space-xs);
  }

  .seed-jump {
    display: flex;
    gap: var(--space-xs);
  }

  .seed-jump input {
    flex: 1;
    padding: var(--space-xs) var(--space-sm);
    background: var(--surface-canvas);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: var(--font-mono);
    outline: none;
    transition: border-color 0.2s;
  }

  .seed-jump input:focus {
    border-color: var(--accent-border);
  }

  /* --- Parameter Controls --- */
  .control-group {
    margin-bottom: var(--space-sm);
  }

  .control-group label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: var(--space-xs);
  }

  .control-group .value {
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
  }

  .control-group input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--surface-canvas);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 4px var(--accent-subtle);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .control-group input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    box-shadow: 0 0 8px var(--accent);
  }

  .control-group input[type="color"] {
    width: 100%;
    height: 32px;
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    background: var(--surface-canvas);
    cursor: pointer;
    padding: 2px;
  }

  /* --- Buttons --- */
  button {
    padding: var(--space-sm) var(--space-md);
    background: var(--surface-canvas);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    letter-spacing: 0.01em;
  }

  button:hover {
    background: var(--surface-elevated);
    border-color: var(--accent-border);
    color: var(--text-primary);
  }

  button:active {
    transform: scale(0.98);
  }

  button.primary {
    background: var(--accent-subtle);
    border-color: var(--accent-border);
    color: var(--text-primary);
  }

  button.primary:hover {
    background: var(--accent);
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: var(--space-xs);
  }

  .actions button {
    width: 100%;
  }

  /* --- Canvas Area --- */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-lg);
    background: var(--surface-canvas);
    position: relative;
  }

  canvas {
    display: block;
    border-radius: var(--radius-sm);
  }

  /* --- Scrollbar --- */
  .sidebar::-webkit-scrollbar {
    width: 4px;
  }

  .sidebar::-webkit-scrollbar-track {
    background: transparent;
  }

  .sidebar::-webkit-scrollbar-thumb {
    background: var(--border-subtle);
    border-radius: 2px;
  }
</style>
</head>
<body>

<!-- === SIDEBAR === -->
<div class="sidebar">
  <div>
    <h1 id="art-title"><!-- derive from project context --></h1>
    <div class="subtitle" id="art-subtitle"><!-- derive from project context --></div>
  </div>

  <!-- Seed Navigation -->
  <div>
    <div class="section-title">Seed</div>
    <div class="seed-display" id="seed-display">42</div>
    <div class="seed-nav">
      <button onclick="changeSeed(-1)">&#9664; Prev</button>
      <button onclick="changeSeed(1)">Next &#9654;</button>
      <button onclick="randomizeSeed()">Random</button>
    </div>
    <div class="seed-jump">
      <input type="number" id="seed-input" placeholder="Seed #" min="0">
      <button onclick="jumpToSeed()">Go</button>
    </div>
  </div>

  <!-- Parameters (customize for each project) -->
  <div id="params-section">
    <div class="section-title">Parameters</div>

    <!-- === REPLACE THESE WITH YOUR PARAMETERS === -->
    <div class="control-group">
      <label><!-- derive name from context --> <span class="value" id="p1-val">500</span></label>
      <input type="range" id="p1" min="50" max="2000" step="50" value="500"
             oninput="updateParam('p1', +this.value)">
    </div>

    <div class="control-group">
      <label><!-- derive name from context --> <span class="value" id="p2-val">0.005</span></label>
      <input type="range" id="p2" min="0.001" max="0.02" step="0.001" value="0.005"
             oninput="updateParam('p2', +this.value)">
    </div>

    <div class="control-group">
      <label><!-- derive name from context --> <span class="value" id="p3-val">1.0</span></label>
      <input type="range" id="p3" min="0" max="3" step="0.1" value="1.0"
             oninput="updateParam('p3', +this.value)">
    </div>
    <!-- === END PARAMETER CONTROLS === -->
  </div>

  <!-- Actions -->
  <div class="actions">
    <div class="section-title">Actions</div>
    <button class="primary" onclick="regenerate()">Regenerate</button>
    <button onclick="resetDefaults()">Reset Defaults</button>
    <button onclick="downloadPNG()">Download PNG</button>
  </div>
</div>

<!-- === CANVAS === -->
<div class="canvas-area" id="canvas-container"></div>

<script>
// ====================================================================
// CONFIGURATION — REPLACE FOR EACH PROJECT
// ====================================================================
const DEFAULTS = {
  seed: 42,
  // Add your parameters here — name them meaningfully based on algorithm
};

let PARAMS = { ...DEFAULTS };

// ====================================================================
// SEED NAVIGATION — FIXED (do not modify)
// ====================================================================
function changeSeed(delta) {
  PARAMS.seed = Math.max(0, PARAMS.seed + delta);
  document.getElementById('seed-display').textContent = PARAMS.seed;
  regenerate();
}

function randomizeSeed() {
  PARAMS.seed = Math.floor(Math.random() * 99999);
  document.getElementById('seed-display').textContent = PARAMS.seed;
  regenerate();
}

function jumpToSeed() {
  let v = parseInt(document.getElementById('seed-input').value);
  if (!isNaN(v) && v >= 0) {
    PARAMS.seed = v;
    document.getElementById('seed-display').textContent = PARAMS.seed;
    document.getElementById('seed-input').value = '';
    regenerate();
  }
}

// ====================================================================
// PARAMETER UPDATES
// ====================================================================
function updateParam(name, value) {
  PARAMS[name] = value;
  let el = document.getElementById(name + '-val');
  if (el) el.textContent = typeof value === 'number' && value < 1 ? value.toFixed(3) : value;
  regenerate();
}

function resetDefaults() {
  PARAMS = { ...DEFAULTS };
  for (let [key, val] of Object.entries(DEFAULTS)) {
    let el = document.getElementById(key);
    if (el) el.value = val;
    let valEl = document.getElementById(key + '-val');
    if (valEl) valEl.textContent = typeof val === 'number' && val < 1 ? val.toFixed(3) : val;
  }
  document.getElementById('seed-display').textContent = PARAMS.seed;
  regenerate();
}

function regenerate() {
  randomSeed(PARAMS.seed);
  noiseSeed(PARAMS.seed);
  clear();
  initializeArt();
  redraw();
}

function downloadPNG() {
  saveCanvas('generative-art-seed-' + PARAMS.seed, 'png');
}

// ====================================================================
// P5.JS SKETCH — REPLACE ENTIRELY FOR EACH PROJECT
// ====================================================================

function initializeArt() {
  // Initialize your generative system using PARAMS
}

function setup() {
  let container = document.getElementById('canvas-container');
  let size = Math.min(container.clientWidth - 40, container.clientHeight - 40, 1080);
  let cnv = createCanvas(size, size);
  cnv.parent('canvas-container');
  pixelDensity(1);
  colorMode(/* derive from context */);

  randomSeed(PARAMS.seed);
  noiseSeed(PARAMS.seed);
  initializeArt();

  // For interactive/animated sketches: remove noLoop()
  // For static generation: keep noLoop()
  noLoop();
}

function draw() {
  // === YOUR ALGORITHM HERE ===
  // Follow the motion skill's Quality Principles:
  // - Textured background, never flat
  // - Layered motion (bg slow, mid moderate, fg fast)
  // - Colors that shift over time
  // - Micro-details that reward attention
}

function windowResized() {
  let container = document.getElementById('canvas-container');
  let size = Math.min(container.clientWidth - 40, container.clientHeight - 40, 1080);
  resizeCanvas(size, size);
  regenerate();
}
</script>
</body>
</html>

font_family      ZedMono Nerd Font
font_size        10
disable_ligatures never
kitty_mod        ctrl
background  #0f0f1a
#221727
#2a1d31
#121124
#0f0f1a
#201a2f
#eee9ff
foreground #eee9ff
#ffeef2
#dffff8
#ff91c3
#ff338f
#c79eff
#98e4a7
color2  #c79eff
cursor  #eee9ff
cursor_shape          underline
cursor_blink_interval 0
shell_integration   enabled no-cursor

window_padding_width 2
background_opacity    1

tab_bar_edge        top
tab_bar_style       fade
tab_bar_align       left
tab_title_template  "{title[:15]}"

active_tab_foreground    #221727
active_tab_background #c79eff
inactive_tab_foreground  #eee9ff
inactive_tab_background  #0f0f1a
tab_bar_margin_width     0
tab_bar_min_tabs         2

copy_on_select      clipboard
strip_trailing_spaces smart

repaint_delay       6
input_delay         1
sync_to_monitor     yes

allow_remote_control    socket-only
listen_on               unix:/tmp/kitty-socket

map kitty_mod+backspace send_text all \x15
map alt+backspace send_text all \x17
map kitty_mod+c send_text all \x03
map kitty_mod+v send_key ctrl+v
map kitty_mod+t       new_tab_with_cwd

map kitty_mod+1       goto_tab 1
map kitty_mod+2       goto_tab 2
map kitty_mod+3       goto_tab 3
map kitty_mod+4       goto_tab 4
map kitty_mod+5       goto_tab 5
map kitty_mod+6       goto_tab 6
map kitty_mod+7       goto_tab 7
map kitty_mod+8       goto_tab 8
map kitty_mod+9       goto_tab 9

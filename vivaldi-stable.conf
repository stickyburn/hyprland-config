# wayland
--ozone-platform=wayland
--enable-wayland-ime
--wayland-text-input-version=3

--ignore-gpu-blocklist
--enable-zero-copy
--force-gpu-rasterization
--enable-unsafe-webgpu
--use-webgpu-adapter=opengles

# --- Hardware Video Acceleration (VA-API) for AMD ---
# This set of features enables hardware video decode/encode via VA-API.
# Requires Mesa >= 24.1 (standard on an up-to-date Arch system).
# - VaapiVideoDecoder: Enables hardware video decoding using VA-API.
# - AcceleratedVideoEncoder: Enables hardware video encoding using VA-API.
# - VaapiIgnoreDriverChecks: Can help if VA-API isn't detected correctly or if there are driver compatibility issues.
# NOTE: Vulkan/ANGLE-Vulkan is disabled because it is incompatible with native Wayland
# (Chromium upstream explicitly blocks it). OpenGL/ANGLE still provides full HW accel.
--enable-features=VaapiVideoDecoder,AcceleratedVideoEncoder,VaapiIgnoreDriverChecks

[mgr]
show_hidden = true

[opener]
pi = [
  { run = 'kitty @ launch --type=tab -- zsh -c "cd \"$@\" && pi"', desc = "Pi" },
]

nvim_file = [{ run = 'nvim "$@"', block = true, desc = "Nvim" }]

nvim = [
  { run = 'kitty @ launch --type=tab -- zsh -c "cd \"$@\" && nvim"', desc = "Nvim" },
]

codium = [
  { run = 'open -a "VSCodium" "$@"', for = "macos", desc = "Codium" },
  { run = 'zsh -c "cd \"$1\" && codium ." -- "$@"', for = "linux", desc = "Codium" },
]

terminal = [{ run = 'kitty @ launch --type=tab --cwd="$@"', desc = "Terminal" }]

finder = [
  { run = 'open -R "$@"', for = "macos", desc = "Finder" },
  { run = 'xdg-open "$(dirname "$@")"', for = "linux", desc = "Finder" },
]

[open]
rules = [
  { url = "*", use = [
    "nvim_file",
  ] },
  { url = "*/", use = [
    "pi",
    "nvim",
    "codium",
    "terminal",
    "finder",
  ] },
]
